temporal_monitor_node:
  ros__parameters:
    runtime_profile: "diagnostic"

    lidar_topic: "/os1_cloud_node1/points"
    imu_topic: "/os1_cloud_node1/imu"
    checked_lidar_topic: "/causal_slam/checked_lidar"

    lidar_gate_mode: "observe"

    lidar_holdback_enabled: true
    lidar_holdback_tolerance_ms: 10.0
    lidar_holdback_max_pending: 64

    lidar_point_time_mode: "auto"
    lidar_point_time_field: ""
    lidar_point_time_interpretation: "auto"
    lidar_point_time_unit: "auto"

    lidar_stamp_policy: "scan_end"
    lidar_prefer_measured_header_period: true

    lidar_qos_reliability: "reliable"
    checked_lidar_qos_reliability: "reliable"
    lidar_qos_depth: 5
    checked_lidar_qos_depth: 5

    tf_monitoring_enabled: false

    lidar_gap_threshold_ms: 10000.0
    imu_gap_threshold_ms: 10000.0

    expected_imu_period_ms: 10.0
    imu_buffer_retention_ms: 5000.0

    max_missing_prefix_ms: 30.0
    max_missing_suffix_ms: 30.0
    max_internal_gap_ms: 50.0

    gate_min_total_imu_samples_before_forward: 5
    gate_min_window_imu_samples_before_forward: 2
