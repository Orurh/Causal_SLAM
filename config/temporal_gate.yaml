# Causal-SLAM temporal gate config.
#
# Real pipeline:
#   lidar_topic -> temporal gate -> checked_lidar_topic
#
# Fake publishers are only for tests/demo. In production, set imu_topic and
# lidar_topic to your real driver/rosbag topics.

temporal_monitor:
  ros__parameters:
    # -------------------------------------------------------------------------
    # Input topics.
    # -------------------------------------------------------------------------
    imu_topic: "/livox/imu"
    lidar_topic: "/livox/lidar"

    # -------------------------------------------------------------------------
    # Output topics.
    # -------------------------------------------------------------------------

    # Output checked PointCloud2 topic.
    # Empty string disables cloud forwarding/proxy output.
    checked_lidar_topic: "/livox/lidar_checked"

    # Decision topics.
    map_update_allowed_topic: "/causal_slam/map_update_allowed"
    temporal_health_topic: "/causal_slam/temporal_health"
    map_update_reason_topic: "/causal_slam/map_update_reason"
    fault_reasons_topic: "/causal_slam/fault_reasons"
    map_update_decision_json_topic: "/causal_slam/map_update_decision_json"

    # -------------------------------------------------------------------------
    # Gate policy.
    # -------------------------------------------------------------------------

    # Gate mode:
    #   observe        - monitor only, never block clouds
    #   drop_invalid   - block INVALID clouds
    #   drop_degraded  - block DEGRADED and INVALID clouds
    #   strict         - pass only OK clouds
    lidar_gate_mode: "drop_degraded"

    # Active gate warmup.
    #
    # In active modes, block LiDAR clouds until the monitor has seen enough IMU
    # timing samples to avoid accepting clouds before the temporal evidence is
    # meaningful.
    #
    # These are product/runtime thresholds, not mathematical constants.
    gate_min_total_imu_samples_before_forward: 5
    gate_min_window_imu_samples_before_forward: 2

    # -------------------------------------------------------------------------
    # Runtime/reporting profile.
    # -------------------------------------------------------------------------

    # Runtime profile:
    #   minimal       - no periodic console summary
    #   diagnostic    - compact periodic console summary
    #   debug_report  - verbose report/debug output
    runtime_profile: "diagnostic"

    # Periodic summary interval.
    summary_period_ms: 2000.0

    # Empty string disables periodic HTML report writing.
    html_report_path: "/tmp/causal_slam_temporal_gate.html"

    # -------------------------------------------------------------------------
    # PointCloud2 QoS.
    # -------------------------------------------------------------------------

    # For large clouds, reliable + depth 20 is usually safer.
    # For unstable wireless links or best-effort drivers, use "best_effort".
    lidar_qos_reliability: "reliable"
    lidar_qos_depth: 20
    checked_lidar_qos_reliability: "reliable"
    checked_lidar_qos_depth: 20

    # -------------------------------------------------------------------------
    # TF — Transform Frames monitoring.
    # -------------------------------------------------------------------------

    # true  - require transform tf_target_frame -> tf_source_frame
    # false - validate only LiDAR/IMU timing
    tf_monitoring_enabled: true
    tf_target_frame: "odom"
    tf_source_frame: "lidar"

    # TF age thresholds.
    #
    # tf_max_transform_age_ms:
    #   maximum acceptable age of the transform used for the LiDAR cloud.
    #
    # tf_max_future_tolerance_ms:
    #   small tolerance for transforms that appear slightly in the future due to
    #   clock precision, scheduling, or playback effects.
    tf_max_transform_age_ms: 50.0
    tf_max_future_tolerance_ms: 1.0

    # -------------------------------------------------------------------------
    # Stream timing thresholds.
    # -------------------------------------------------------------------------

    # Expected IMU period.
    # Example:
    #   5.0 ms  -> 200 Hz IMU
    #   10.0 ms -> 100 Hz IMU
    #   20.0 ms -> 50 Hz IMU
    expected_imu_period_ms: 20.0

    # Keep recent IMU samples for LiDAR scan-window coverage analysis.
    imu_buffer_retention_ms: 5000.0

    # Detect long gaps in the incoming IMU/LiDAR streams.
    imu_gap_threshold_ms: 500.0
    lidar_gap_threshold_ms: 500.0

    # -------------------------------------------------------------------------
    # LiDAR scan window estimation.
    # -------------------------------------------------------------------------

    # Fallback scan duration used when no better estimate is available.
    # Example:
    #   100.0 ms -> 10 Hz LiDAR
    #   50.0 ms  -> 20 Hz LiDAR
    lidar_scan_duration_ms: 100.0

    # Accept measured LiDAR header period only inside this range.
    # This avoids treating broken timestamps as a valid scan duration.
    lidar_min_measured_scan_duration_ms: 1.0
    lidar_max_measured_scan_duration_ms: 500.0

    # true:
    #   prefer measured period between LiDAR headers when it looks sane.
    #
    # false:
    #   always use lidar_scan_duration_ms fallback policy.
    lidar_prefer_measured_header_period: true

    # How to interpret PointCloud2 header.stamp:
    #   scan_start   - header.stamp is the beginning of the scan
    #   scan_middle  - header.stamp is the middle of the scan
    #   scan_end     - header.stamp is the end of the scan
    lidar_stamp_policy: "scan_end"

    # -------------------------------------------------------------------------
    # IMU coverage over LiDAR scan window.
    # -------------------------------------------------------------------------

    # Maximum allowed missing IMU coverage at the beginning of a LiDAR scan.
    max_missing_prefix_ms: 30.0

    # Maximum allowed missing IMU coverage at the end of a LiDAR scan.
    max_missing_suffix_ms: 30.0

    # Maximum allowed internal IMU gap inside a LiDAR scan window.
    max_internal_gap_ms: 50.0

temporal_status_bridge:
  ros__parameters:
    map_update_allowed_topic: "/causal_slam/map_update_allowed"
    temporal_health_topic: "/causal_slam/temporal_health"
    map_update_reason_topic: "/causal_slam/map_update_reason"
    fault_reasons_topic: "/causal_slam/fault_reasons"
    map_update_decision_json_topic: "/causal_slam/map_update_decision_json"
    diagnostics_topic: "/diagnostics"