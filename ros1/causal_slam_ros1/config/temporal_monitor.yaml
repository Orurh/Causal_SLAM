# Causal-SLAM ROS1 temporal monitor configuration.
#
# IMU — Inertial Measurement Unit.
# LiDAR — Light Detection and Ranging.
#
# The monitor checks whether LiDAR scan windows and IMU samples are temporally
# compatible before map updates should be trusted.

imu_topic: /imu/data
lidar_topic: /points

map_update_allowed_topic: /causal_slam/map_update_allowed
temporal_health_topic: /causal_slam/temporal_health
map_update_reason_topic: /causal_slam/map_update_reason
fault_reasons_topic: /causal_slam/fault_reasons

summary_period_ms: 2000.0

# Stream timing thresholds.
expected_imu_period_ms: 20.0
imu_gap_threshold_ms: 100.0
lidar_gap_threshold_ms: 500.0

# LiDAR scan window estimation.
lidar_scan_duration_ms: 100.0
lidar_min_measured_scan_duration_ms: 1.0
lidar_max_measured_scan_duration_ms: 500.0
lidar_prefer_measured_header_period: true

# Supported values:
#   scan_start
#   scan_middle
#   scan_end
lidar_stamp_policy: scan_end

# IMU coverage over LiDAR scan window.
imu_buffer_retention_ms: 5000.0
max_missing_prefix_ms: 40.0
max_missing_suffix_ms: 40.0
max_internal_gap_ms: 100.0
